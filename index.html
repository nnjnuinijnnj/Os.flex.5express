<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flex OS 5 Express</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="boot">

    <div class="logo">
        FLEX
    </div>

    <div class="version">
        OS 5 Express
    </div>

    <div class="loading">
        <div class="bar"></div>
    </div>

</div>


<div id="desktop">


<div class="icons">

    <div class="app">
        📁
        <span>Files</span>
    </div>


    <div class="app">
        🌐
        <span>Browser</span>
    </div>


    <div class="app">
        📦
        <span>Store</span>
    </div>


    <div class="app">
        ⚙️
        <span>Settings</span>
    </div>


</div>



<div class="taskbar">

    <button class="flex-btn">
        🟦 Flex
    </button>

<div id="flexMenu">

    <h2>Flex OS</h2>

    <input 
    type="text" 
    placeholder="Search apps..."
    >

    <div class="menu-apps">

        <div>📁 Files</div>
        <div>🌐 Browser</div>
        <div>📦 Store</div>
        <div>⚙️ Settings</div>
        <div>📝 Notes</div>

    </div>

</div>
    
    <div class="time">
        12:00
    </div>


</div>


</div>


<script src="script.js"></script>

</body>
</html>
